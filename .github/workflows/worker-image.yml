name: Worker image

on:
  workflow_dispatch:
    inputs:
      blender_url:
        description: Official Linux x64 Blender tarball URL
        required: true
        type: string
      publish:
        description: Publish the verified image to GHCR
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-smoke-publish:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worker
          load: true
          push: false
          tags: blender-nrp-worker:smoke
          build-args: |
            BLENDER_URL=${{ inputs.blender_url }}
      - name: Smoke test worker image
        run: scripts/container_smoke.sh blender-nrp-worker:smoke
      - name: Log in to GHCR
        if: inputs.publish
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish verified worker image
        if: inputs.publish
        env:
          IMAGE: ghcr.io/${{ github.repository_owner }}/blender-nrp-worker
        run: |
          docker tag blender-nrp-worker:smoke "$IMAGE:${GITHUB_SHA}"
          docker tag blender-nrp-worker:smoke "$IMAGE:latest"
          docker push "$IMAGE:${GITHUB_SHA}"
          docker push "$IMAGE:latest"
